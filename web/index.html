<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SV Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1d1d1f;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }

    #module-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      color: #ccc;
      font-size: 13px;
    }
    #module-select {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 13px;
    }

    #render-btn {
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #render-btn:hover { background: #0077ed; }
    #render-btn:disabled { background: #555; cursor: default; }

    #back-btn {
      background: transparent;
      color: #bbb;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #back-btn:not(:disabled):hover { background: #333; color: #fff; }
    #back-btn:disabled { opacity: 0.25; cursor: default; }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: #ddd;
    }

    .pane {
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    #editor-pane { flex: 0 0 38%; min-width: 0; }
    #diagram-pane { flex: 1; }

    /* ── CodeMirror エディタ ─────────────────────────────────── */
    #sv-source-editor {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #sv-source-editor .cm-editor {
      height: 100%;
      font-size: 13px;
    }
    #sv-source-editor .cm-editor.cm-focused {
      outline: none;
    }
    #sv-source-editor .cm-scroller {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      line-height: 1.6;
      /* リガチャ（合字）を無効化: <= が ⇐ に、=== が連結表示されるのを防ぐ */
      font-variant-ligatures: none;
      font-feature-settings: 'liga' 0, 'calt' 0;
    }

    #diagram-wrap {
      flex: 1;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      position: relative;
      min-height: 0;
    }
    /* パン中: 子要素含めて全て grabbing に上書き */
    #diagram-wrap.panning,
    #diagram-wrap.panning * { cursor: grabbing !important; }

    /* ── ノード インタラクション ─────────────────────────── */
    #diagram-wrap .node { cursor: pointer; }

    /* 選択状態 */
    #diagram-wrap .node.selected .node-bg {
      stroke: #ff8800;
      stroke-width: 2.5px;
      filter: drop-shadow(0 0 5px rgba(255,136,0,0.55));
    }

    /* インスタンスノード: ダブルクリックでドリルダウン可能 */
    #diagram-wrap .node.inst-module:not(.selected):hover .node-bg {
      stroke: #3399ff;
      stroke-width: 2px;
      filter: drop-shadow(0 0 4px rgba(51,153,255,0.45));
    }

    /* ── グループノード インタラクション ───────────────────── */
    #diagram-wrap .group-bg-item { cursor: pointer; }
    #diagram-wrap .group-bg-item:hover .group-rect {
      stroke: #7755cc;
      stroke-width: 2px;
      opacity: 0.9;
    }
    #diagram-wrap .group-bg-item.selected .group-rect {
      stroke: #ff8800;
      stroke-width: 2px;
      opacity: 1;
      filter: drop-shadow(0 0 6px rgba(255,136,0,0.4));
    }

    /* ── エッジ インタラクション ─────────────────────────── */
    #diagram-wrap .edge { cursor: pointer; }

    /* ホバー */
    #diagram-wrap .edge:not(.selected):hover .edge-line {
      stroke: #3399ff;
      stroke-width: 2.5px;
    }

    /* 選択状態 */
    #diagram-wrap .edge.selected .edge-line {
      stroke: #ff8800;
      stroke-width: 2.5px;
      filter: drop-shadow(0 0 5px rgba(255,136,0,0.55));
    }

    /* ── プロパティパネル ────────────────────────────────────── */
    #props-panel {
      flex-shrink: 0;
      height: 108px;
      border-top: 1px solid #ddd;
      background: #f8f8fa;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #props-header {
      padding: 4px 12px;
      background: #f0f0f2;
      border-bottom: 1px solid #e0e0e4;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #props-kind {
      color: #5566cc;
    }
    #props-id {
      color: #999;
      font-weight: 400;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      font-variant-ligatures: none;
      font-feature-settings: 'liga' 0, 'calt' 0;
    }
    #props-body {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      padding: 6px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px 20px;
      align-content: flex-start;
    }
    .props-row {
      display: flex;
      gap: 5px;
      align-items: baseline;
      white-space: nowrap;
    }
    .props-key {
      font-size: 11px;
      color: #999;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .props-val {
      font-size: 12px;
      color: #1d1d1f;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-variant-ligatures: none;
      font-feature-settings: 'liga' 0, 'calt' 0;
    }
    .props-empty {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      align-self: center;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      padding: 2px 0;
    }
    #status.error { color: #e03e3e; }
    #status.ok    { color: #30a030; }

    /* ── VCD パネル ─────────────────────────────────────────────── */
    #vcd-panel {
      flex-shrink: 0;
      border-top: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }
    #vcd-controls {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fafafa;
    }
    #vcd-file-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #0071e3;
      color: #fff;
      border-radius: 5px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #vcd-file-label:hover { background: #0077ed; }
    #vcd-file-label input[type="file"] { display: none; }
    #vcd-debug-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #555;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #vcd-debug-btn:hover { background: #333; }
    #vcd-info {
      font-size: 12px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    #vcd-info.error  { color: #e03e3e; }
    #vcd-info.ok     { color: #30a030; }
    #vcd-info.warn   { color: #cc7700; }
    /* 警告バナー（大ファイル確認用） */
    #vcd-warn-banner {
      display: none;
      padding: 6px 12px;
      background: #fff3cd;
      border-top: 1px solid #ffc107;
      font-size: 12px;
      color: #856404;
      gap: 10px;
      align-items: center;
    }
    #vcd-warn-banner.visible { display: flex; }
    #vcd-warn-banner button {
      padding: 2px 10px;
      border-radius: 4px;
      border: 1px solid currentColor;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: inherit;
      white-space: nowrap;
    }
    #vcd-warn-banner button.primary {
      background: #856404;
      color: #fff;
      border-color: #856404;
    }

    /* ── 波形ビューワパネル ──────────────────────────────────────── */
    #waveform-pane {
      flex-shrink: 0;
      height: 220px;
      min-height: 0;
      display: none;           /* VCD 読み込み後に表示 */
      flex-direction: column;
      border-top: 2px solid #555;
      background: #1e1e2e;
      resize: vertical;
      overflow: auto;
    }
    #waveform-pane.visible { display: flex; }

    #waveform-pane .pane-header {
      background: #181825;
      border-bottom: 1px solid #313244;
      color: #a6adc8;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 12px;
    }
    #waveform-close-btn {
      margin-left: auto;
      background: transparent;
      border: none;
      color: #6c7086;
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    #waveform-close-btn:hover { color: #cdd6f4; }
    #waveform-container { flex: 1; min-height: 0; }

    /* ── waveform-viewer.js のスタイル ─────────────────────────── */
    .wv-root {
      display: flex;
      flex-direction: column;
      height: 100%;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      color: #cdd6f4;
      background: #1e1e2e;
    }
    .wv-header {
      padding: 2px 8px;
      font-size: 11px;
      color: #a6adc8;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wv-header-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wv-zoom-wrap {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .wv-zoom-btn {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 3px;
      min-width: 28px;
      height: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .wv-zoom-btn:hover { background: #45475a; }
    .wv-body {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .wv-label-wrap {
      width: 128px;
      flex-shrink: 0;
      overflow: hidden;
      background: #181825;
      border-right: 1px solid #313244;
      cursor: pointer;
    }
    .wv-wave-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .wv-value-wrap {
      width: 76px;
      flex-shrink: 0;
      overflow: hidden;
      background: #181825;
      border-left: 1px solid #313244;
    }
    .wv-value-svg { display: block; }
    /* 信号行ハイライト (ダイアグラムのエッジ選択と連動) */
    .wv-hl-rect { fill: #cba6f7; fill-opacity: 0.22; }
    /* 値テキストの色分け */
    .wv-val-text { font-size: 11px; font-family: 'Cascadia Code','Fira Code','Consolas',monospace; }
    .wv-val-hi   { fill: #a6e3a1; }   /* HIGH = 緑 */
    .wv-val-lo   { fill: #6c7086; }   /* LOW  = 暗め */
    .wv-val-x    { fill: #f38ba8; }   /* x/z  = 赤 */
    .wv-val-hex  { fill: #89dceb; }   /* バス値 = シアン */
    /* 行背景 */
    .wv-row-bg.even { fill: #1e1e2e; }
    .wv-row-bg.odd  { fill: #181825; }
    /* 信号名ラベル */
    .wv-label {
      font-size: 11px;
      fill: #cdd6f4;
      font-variant-ligatures: none;
    }
    /* 区切り線 */
    .wv-sep { stroke: #313244; stroke-width: 0.5; }
    /* グリッド線 */
    .wv-grid {
      stroke: #313244;
      stroke-width: 0.5;
      stroke-dasharray: 2,3;
    }
    /* 時刻軸 */
    .wv-axis-bg   { fill: #12121a; }
    .wv-axis-base { stroke: #585b70; stroke-width: 1; }
    .wv-tick      { stroke: #585b70; stroke-width: 1; }
    .wv-tick-label {
      font-size: 9px;
      fill: #a6adc8;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }
    /* 1 ビット波形 */
    .wv-1bit { stroke: #89dceb; stroke-width: 1.5; }
    /* バス波形 */
    .wv-bus-fill { fill: #2a2a3e; }
    .wv-bus-edge { stroke: #89dceb; stroke-width: 1.5; }
    .wv-bus-val  { font-size: 10px; fill: #cdd6f4; }
    /* 不定 (x/z) */
    .wv-x { stroke: #f38ba8; stroke-width: 1; stroke-dasharray: 3,2; }
    /* 時刻カーソル */
    .wv-cursor-line { stroke: #f5c2e7; stroke-width: 1.5; pointer-events: none; }
    .wv-cursor-head { fill: #f5c2e7; pointer-events: none; }
    .wv-wave-svg    { cursor: crosshair; display: block; }
    .wv-label-svg   { display: block; }
    /* ─── エッジ値オーバーレイ ───────────────────────────── */
    .edge-val-bg   { fill: #1e1e2e; stroke: #89b4fa; stroke-width: 1; }
    .edge-val-text { font-size: 11px; font-family: monospace; fill: #cdd6f4; }
  </style>
</head>
<body>
  <header>
    <h1>SV Diagram</h1>
    <span id="status">WASM を初期化中...</span>
    <div id="module-select-wrap">
      表示モジュール:
      <select id="module-select"></select>
    </div>
    <button id="back-btn" disabled>↑ 上位階層</button>
    <button id="render-btn" disabled>▶ Render</button>
  </header>

  <div class="workspace">
    <div class="pane" id="editor-pane">
      <div class="pane-header">SystemVerilog Source</div>
      <div id="sv-source-editor"></div>
      <div id="vcd-panel">
        <div class="pane-header">VCD</div>
        <div id="vcd-warn-banner">
          <span id="vcd-warn-text"></span>
          <button id="vcd-warn-ok" class="primary">読み込む</button>
          <button id="vcd-warn-cancel">キャンセル</button>
        </div>
        <div id="vcd-controls">
          <label id="vcd-file-label">
            <input type="file" id="vcd-file-input" accept=".vcd" />
            📂 VCD を選択
          </label>
          <span id="vcd-info">ファイルが選択されていません</span>
        </div>
      </div>
    </div>
    <div class="pane" id="diagram-pane">
      <div class="pane-header">Diagram</div>
      <div id="diagram-wrap"></div>
      <div id="props-panel">
        <div id="props-header">
          <span id="props-kind">Properties</span>
          <span id="props-id"></span>
        </div>
        <div id="props-body">
          <span class="props-empty">ノードまたはエッジを選択してください</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 波形ビューワパネル (VCD 読み込み後に表示) -->
  <div id="waveform-pane">
    <div class="pane-header">
      Waveform
      <button id="waveform-close-btn" title="閉じる">✕</button>
    </div>
    <div id="waveform-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
