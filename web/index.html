<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SV Diagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1d1d1f;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }

    #module-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      color: #ccc;
      font-size: 13px;
    }
    #module-select {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 13px;
    }

    #render-btn {
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #render-btn:hover { background: #0077ed; }
    #render-btn:disabled { background: #555; cursor: default; }

    #back-btn {
      background: transparent;
      color: #bbb;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #back-btn:not(:disabled):hover { background: #333; color: #fff; }
    #back-btn:disabled { opacity: 0.25; cursor: default; }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: #ddd;
    }

    .pane {
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    #editor-pane { flex: 0 0 38%; }
    #diagram-pane { flex: 1; }

    #sv-source {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #1d1d1f;
      tab-size: 2;
    }

    #diagram-wrap {
      flex: 1;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      position: relative;
    }
    /* パン中: 子要素含めて全て grabbing に上書き */
    #diagram-wrap.panning,
    #diagram-wrap.panning * { cursor: grabbing !important; }

    /* ── ノード インタラクション ─────────────────────────── */
    #diagram-wrap .node { cursor: pointer; }

    /* 選択状態 */
    #diagram-wrap .node.selected .node-bg {
      stroke: #ff8800;
      stroke-width: 2.5px;
      filter: drop-shadow(0 0 5px rgba(255,136,0,0.55));
    }

    /* インスタンスノード: ダブルクリックでドリルダウン可能 */
    #diagram-wrap .node.inst-module:not(.selected):hover .node-bg {
      stroke: #3399ff;
      stroke-width: 2px;
      filter: drop-shadow(0 0 4px rgba(51,153,255,0.45));
    }

    /* ── エッジ インタラクション ─────────────────────────── */
    #diagram-wrap .edge { cursor: pointer; }

    /* ホバー */
    #diagram-wrap .edge:not(.selected):hover .edge-line {
      stroke: #3399ff;
      stroke-width: 2.5px;
    }

    /* 選択状態 */
    #diagram-wrap .edge.selected .edge-line {
      stroke: #ff8800;
      stroke-width: 2.5px;
      filter: drop-shadow(0 0 5px rgba(255,136,0,0.55));
    }

    #status {
      font-size: 12px;
      color: #aaa;
      padding: 2px 0;
    }
    #status.error { color: #e03e3e; }
    #status.ok    { color: #30a030; }
  </style>
</head>
<body>
  <header>
    <h1>SV Diagram</h1>
    <span id="status">WASM を初期化中...</span>
    <div id="module-select-wrap">
      表示モジュール:
      <select id="module-select"></select>
    </div>
    <button id="back-btn" disabled>↑ 上位階層</button>
    <button id="render-btn" disabled>▶ Render</button>
  </header>

  <div class="workspace">
    <div class="pane" id="editor-pane">
      <div class="pane-header">SystemVerilog Source</div>
      <textarea id="sv-source" spellcheck="false"></textarea>
    </div>
    <div class="pane" id="diagram-pane">
      <div class="pane-header">Diagram</div>
      <div id="diagram-wrap"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
